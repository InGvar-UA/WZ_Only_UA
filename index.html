<!DOCTYPE html>
<html lang="uk">
<head>
            <!-- Ключевые слова и описание для поисковых роботов Google -->
    <meta name="keywords" content="warzone only ua, актуальна мета warzone, збірки зброї warzone, пошук паті варзон, знайти напарника warzone, warzone lfg ua, найкращі збірки варзон, сборки оружия варзон, найти напарника варзон, поиск пати варзон, актуальная мета варзон 2026, сборки на пс5 и пк">
    <meta name="description" content="Перший український хаб Call of Duty: Warzone для PS5, Xbox та PC. Актуальні мета-збірки зброї з автоматичним щоденним оновленням о 10:00 та зручний пошук паті (LFG).">


    <meta name="google-site-verification" content="tf37M14ShcT0J4fVPz8FEd9ihxw7Qifp4-pLVKfOjsc" />
    <script>
    let allWeapons = [];
    let currentCategory = ''; // Изначально пустая, чтобы не рендерить все пушки при старте

    // 1. Завантаження даних із примусовим скиданням кэшу
    async function loadMeta() {
        try {
            const response = await fetch('wz_meta_ua.json?_=' + new Date().getTime());
            const data = await response.json();
            
            allWeapons = data.weapons || [];
            const updateTime = data.last_updated || "Невідомо";
            
            // Виводим время в подвал
            const bottomSync = document.getElementById('sync-time');
            if (bottomSync) bottomSync.innerHTML = `Дані оновлено: <b>${updateTime}</b>`;
            
            // Виводим время на верхнюю плашку
            const topSync = document.getElementById('sync-time-top');
            if (topSync) topSync.innerHTML = `📅 Мета оновлена: <b>${updateTime}</b>`;
            
            // Убираем активный класс со всех кнопок при старте, чтобы "Усі класи" не горела зря
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            
            // ВАЖНО: Вместо displayWeapons() выводим стартовое приветствие
            showWelcomeMessage();

        } catch (error) {
            document.getElementById('meta-grid').innerHTML = 
                `<div class="error">Помилка завантаження даних. Перевірте файл JSON.</div>`;
            console.error('Помилка fetch:', error);
        }
    }

    // Функция, которая показывает стартовую плашку-приветствие
    function showWelcomeMessage() {
        const grid = document.getElementById('meta-grid');
        if (grid) {
            grid.innerHTML = `
                <div class="loading" style="animation: none; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,204,0,0.2); padding: 30px 20px; border-radius: 8px;">
                    <span style="font-size: 24px; display: block; margin-bottom: 10px;">👋 Вітаємо у Meta App!</span>
                    <p style="font-size: 14px; color: #a0a0a0; margin: 0;">Оберіть будь-який клас зброї вище або скористайтеся пошуком, щоб побачити актуальні мета-збірки.</p>
                </div>
            `;
        }
    }

    // 2. Словник перекладу категорій та класів зброї
    const translations = {
        "Muzzle": "Глушник / Дуло",
        "Barrel": "Ствол",
        "Laser": "Лазер",
        "Optic": "Оптика / Приціл",
        "Stock": "Приклад",
        "Rear Grip": "Задня рукоятка",
        "Magazine": "Магазин / Набої",
        "Ammo": "Боєприпаси",
        "Underbarrel": "Підствольна планка",
        "Comb": "Гребінь прицілу",
        "Guard": "Цівка / Захист",
        "Fire Mods": "Модифікація вогню",
        "Conversion Kit": "Набір конверсії",
        "Perk": "Перк / Уміння",
        "Bolt": "Затвор",
        "Rail": "Рейка прицілу",
        
        "SMG": "ПП (SMG)",
        "AR": "Штурмова гвинтівка",
        "Sniper": "Снайперська гвинтівка",
        "LMG": "Кулемет (LMG)",
        "Shotgun": "Дробовик",
        "Marksman Rifle": "Піхотна гвинтівка",
        "Battle Rifle": "Бойова гвинтівка",
        "Pistol": "Пістолет",
        "Melee": "Ближній бій",
        "Launcher": "Ракетниця",
        "Special": "Спеціальна зброя",
        "All": "Усі класи"
    };

    // 3. Функція виведення карток зброї на екран
    function displayWeapons(weapons) {
        const grid = document.getElementById('meta-grid');
        grid.innerHTML = '';

        if (!weapons || weapons.length === 0) {
            grid.innerHTML = `<div class="no-results">Нічого не знайдено</div>`;
            return;
        }

        weapons.forEach(wpn => {
            const card = document.createElement('div');
            card.className = 'weapon-card';
            
            const translatedClass = translations[wpn.class] || wpn.class;
            let cleanAttachments = [];

            if (wpn.attachments && Array.isArray(wpn.attachments)) {
                wpn.attachments.forEach(att => {
                    let clean = "";
                    
                    if (att && typeof att === 'object' && att.name) {
                        clean = (att.category && att.category !== "🔧" ? att.category + " " : "") + att.name;
                    } else if (typeof att === 'string') {
                        clean = att.replace(/^- /, "").trim();
                    }

                    if (!clean) return;

                    let isPureCategory = Object.keys(translations).some(cat => cat.toLowerCase() === clean.toLowerCase());
                    if (isPureCategory) return;

                    let category = "";
                    let name = clean;

                    let foundCat = Object.keys(translations).find(cat => {
                        let regex = new RegExp("^" + cat + "\\s+", "i");
                        return regex.test(clean);
                    });
                    
                    if (foundCat) {
                        category = foundCat;
                        name = clean.replace(new RegExp("^" + foundCat + "\\s+", "i"), "").trim();
                    }

                    if (category) {
                        let translatedCategory = translations[category] || category;
                        cleanAttachments.push(`<li><span>${translatedCategory}:</span> ${name}</li>`);
                    } else {
                        cleanAttachments.push(`<li>🔧 ${name}</li>`);
                    }
                });
            }

            let uniqueList = [...new Set(cleanAttachments)].slice(0, 5).join('');

            card.innerHTML = `
                <div class="rank">#${wpn.rank}</div>
                <h2 class="weapon-name">${wpn.name}</h2>
                <div class="tags">
                    <span class="tag game-tag">${wpn.game}</span>
                    <span class="tag class-tag">${translatedClass}</span>
                </div>
                <ul class="attachments-list">
                    ${uniqueList}
                </ul>
            `;
            grid.appendChild(card);
        });
    }

    // 4. Логіка одночасної фільтрації за пошуком та кнопками
    function filterWeapons() {
        const searchInput = document.getElementById('search-input');
        const searchQuery = searchInput ? searchInput.value.toLowerCase().trim() : "";
        
        // Если категория еще не выбрана и строка поиска пустая — оставляем приветствие
        if (currentCategory === '' && searchQuery === "") {
            showWelcomeMessage();
            return;
        }

        const filtered = allWeapons.filter(wpn => {
            const weaponName = wpn.name ? wpn.name.toLowerCase() : "";
            const weaponClassEng = wpn.class ? wpn.class.toLowerCase() : "";
            const translatedClassRaw = translations[wpn.class] || wpn.class;
            const weaponClassUa = translatedClassRaw.toLowerCase();
            
            const matchesSearch = searchQuery === "" || 
                                  weaponName.includes(searchQuery) || 
                                  weaponClassEng.includes(searchQuery) ||
                                  weaponClassUa.includes(searchQuery);
            
            // Если была нажата кнопка "Усі класи" (all) или класс совпадает
            const matchesCategory = (currentCategory === 'all') || (currentCategory === '') || (wpn.class === currentCategory);
            
            return matchesSearch && matchesCategory;
        });
        
        displayWeapons(filtered);
    }

    // Прив'язуємо події пошуку
    const searchElement = document.getElementById('search-input');
    if (searchElement) {
        searchElement.addEventListener('input', filterWeapons);
    }

    // Прив'язуємо кліки по кнопках категорій
    const tagsElement = document.getElementById('categories-tags');
    if (tagsElement) {
        tagsElement.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                currentCategory = e.target.getAttribute('data-class');
                filterWeapons();
            }
        });
    }

    document.addEventListener('DOMContentLoaded', loadMeta);

    // Логіка мобільних пристроїв: ховаємо клавіатуру
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
        searchInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                searchInput.blur();
            }
        });
        
        searchInput.addEventListener('change', function() {
            searchInput.blur();
        });

        document.addEventListener('click', function(event) {
            if (event.target !== searchInput && !event.target.classList.contains('filter-btn')) {
                searchInput.blur();
            }
        });
    }
</script>

</body>
</html>
