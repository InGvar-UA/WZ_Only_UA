<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZ_Only_UA — Актуальна Мета Warzone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Warzone Only UA</div>
        <p>Актуальні збірки та мета зброї Call of Duty: Warzone</p>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Пошук зброї за назвою (напр. Carbon)...">
        </div>
    </header>

    <main class="meta-container" id="meta-grid">
        <!-- Карточки оружия будут добавляться сюда автоматически через JavaScript -->
        <div class="loading">Завантаження актуальної мети...</div>
    </main>

    <footer>
        <p>&copy; 2026 Warzone Only UA. Дані оновлюються автоматично. t.me/cod_uah</p>
    </footer>

    <script>
    let allWeapons = [];

    // 1. Завантаження даних із JSON-файлу
    async function loadMeta() {
        try {
            const response = await fetch('wz_meta_ua.json');
            allWeapons = await response.json();
            displayWeapons(allWeapons);
        } catch (error) {
            document.getElementById('meta-grid').innerHTML = 
                `<div class="error">Помилка завантаження даних. Перевірте файл JSON.</div>`;
            console.error(error);
        }
    }

    // 2. Повний словник перекладу категорій та класів
    const translations = {
        // Категорії модулів (Attachments)
        "Muzzle": "Глушник / Дуло",
        "Barrel": "Ствол",
        "Laser": "Лазер",
        "Optic": "Оптика / Приціл",
        "Stock": "Приклад",
        "Rear Grip": "Задня рукоятка",
        "Magazine": "Магазин / Набої",
        "Ammo": "Боєприпаси",
        "Underbarrel": "Підствольна планка",
        "Comb": "Гребінь прицілу",
        "Guard": "Цівка / Захист",
        "Fire Mods": "Модифікація вогню",
        "Conversion Kit": "Набір конверсії",
        "Perk": "Перк / Уміння",
        
        // Класи зброї (Weapon Classes)
        "SMG": "ПП (SMG)",
        "AR": "Штурмова гвинтівка",
        "Sniper": "Снайперська гвинтівка",
        "LMG": "Кулемет (LMG)",
        "Shotgun": "Дробовик",
        "Marksman": "Піхотна гвинтівка",
        "Battle Rifle": "Бойова гвинтівка",
        "Pistol": "Пістолет",
        "Melee": "Ближній бій",
        "Launcher": "Ракетниця",
        "All": "Усі класи"
    };

    // 3. Функція виведення карток з точною збіркою з 5 модулів
    function displayWeapons(weapons) {
        const grid = document.getElementById('meta-grid');
        grid.innerHTML = '';

        if (weapons.length === 0) {
            grid.innerHTML = `<div class="no-results">Нічого не знайдено</div>`;
            return;
        }

        // Список категорій для точного зіставлення (включаючи ті, що з пробілами)
        const knownCategories = [
            "Muzzle", "Barrel", "Laser", "Optic", "Stock", 
            "Rear Grip", "Magazine", "Ammo", "Underbarrel", 
            "Comb", "Guard", "Fire Mods", "Conversion Kit", "Perk"
        ];

        weapons.forEach(wpn => {
            const card = document.createElement('div');
            card.className = 'weapon-card';
            
            const translatedClass = translations[wpn.class] || wpn.class;
            
            let cleanAttachments = [];
            let rawList = wpn.attachments;

            // Очищаємо масив від випадкових дублікатів назви самої зброї
            let filteredRaw = rawList.filter(item => item !== wpn.name && item.trim() !== "");

            for (let i = 0; i < filteredRaw.length; i++) {
                let current = filteredRaw[i].trim();
                
                // Перевіряємо, чи є поточний елемент відомою категорією
                let isCategory = knownCategories.some(cat => cat.toLowerCase() === current.toLowerCase());

                if (isCategory && (i + 1 < filteredRaw.length)) {
                    let category = current;
                    let name = filteredRaw[i + 1];

                    // Знаходимо правильний ключ для перекладу із словника
                    let matchedKey = knownCategories.find(cat => cat.toLowerCase() === category.toLowerCase());
                    let translatedCategory = translations[matchedKey] || category;

                    cleanAttachments.push(`<span>${translatedCategory}:</span> ${name}`);
                    i++; // Пропускаємо назву модуля, бо ми її вже об'єднали з категорією
                } else {
                    // Якщо рядок самостійний і не є категорією
                    if (!knownCategories.some(cat => current.toLowerCase().includes(cat.toLowerCase()))) {
                        cleanAttachments.push(`🔧 ${current}`);
                    }
                }
            }

            // Якщо раптом масив пустий, виводимо сирі дані для безпеки
            if (cleanAttachments.length === 0) {
                cleanAttachments = filteredRaw.map(att => `🔧 ${att}`);
            }

            // Обмежуємо вивід стандартними 5 слотами модифікацій
            const attachmentsHtml = cleanAttachments.slice(0, 5).map(att => `<li>${att}</li>`).join('');

            card.innerHTML = `
                <div class="rank">#${wpn.rank}</div>
                <h2 class="weapon-name">${wpn.name}</h2>
                <div class="tags">
                    <span class="tag game-tag">${wpn.game}</span>
                    <span class="tag class-tag">${translatedClass}</span>
                </div>
                <ul class="attachments-list">
                    ${attachmentsHtml}
                </ul>
            `;
            grid.appendChild(card);
        });
    }

    // 4. Логіка швидкого пошуку по сайту
    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = allWeapons.filter(wpn => 
            wpn.name.toLowerCase().includes(query) || 
            wpn.class.toLowerCase().includes(query)
        );
        displayWeapons(filtered);
    });

    document.addEventListener('DOMContentLoaded', loadMeta);
</script>


</body>
</html>
