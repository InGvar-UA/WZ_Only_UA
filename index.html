<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZ_Only_UA — Актуальна Мета Warzone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Warzone Only UA</div>
        <p>Актуальні збірки та мета зброї Call of Duty: Warzone</p>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Пошук зброї за назвою (напр. Carbon)...">
        </div>
    </header>

    <main class="meta-container" id="meta-grid">
        <!-- Карточки оружия будут добавляться сюда автоматически через JavaScript -->
        <div class="loading">Завантаження актуальної мети...</div>
    </main>

    <footer>
        <p>&copy; 2026 Warzone Only UA. Дані оновлюються автоматично. t.me/cod_uah</p>
    </footer>

    <script>
    let allWeapons = [];

    // 1. Завантаження даних із JSON-файлу
    async function loadMeta() {
        try {
            const response = await fetch('wz_meta_ua.json');
            allWeapons = await response.json();
            displayWeapons(allWeapons);
        } catch (error) {
            document.getElementById('meta-grid').innerHTML = 
                `<div class="error">Помилка завантаження даних. Перевірте файл JSON.</div>`;
            console.error(error);
        }
    }

    // 2. Повний словник перекладу категорій та класів
    const translations = {
        // Категорії модулів (Attachments)
        "Muzzle": "Глушник / Дуло",
        "Barrel": "Ствол",
        "Laser": "Лазер",
        "Optic": "Оптика / Приціл",
        "Stock": "Приклад",
        "Rear Grip": "Задня рукоятка",
        "Magazine": "Магазин / Набої",
        "Ammo": "Боєприпаси",
        "Underbarrel": "Підствольна планка",
        "Comb": "Гребінь прицілу",
        "Guard": "Цівка / Захист",
        "Fire Mods": "Модифікація вогню",
        "Conversion Kit": "Набір конверсії",
        "Perk": "Перк / Уміння",
        
        // Класи зброї (Weapon Classes)
        "SMG": "ПП (SMG)",
        "AR": "Штурмова гвинтівка",
        "Sniper": "Снайперська гвинтівка",
        "LMG": "Кулемет (LMG)",
        "Shotgun": "Дробовик",
        "Marksman": "Піхотна гвинтівка",
        "Battle Rifle": "Бойова гвинтівка",
        "Pistol": "Пістолет",
        "Melee": "Ближній бій",
        "Launcher": "Ракетниця",
        "All": "Усі класи"
    };

    // 3. Функція виведення карток з точною збіркою з 5 модулів
    function displayWeapons(weapons) {
    const grid = document.getElementById('meta-grid');
    grid.innerHTML = '';

    if (weapons.length === 0) {
        grid.innerHTML = `<div class="no-results">Нічого не знайдено</div>`;
        return;
    }

    weapons.forEach(wpn => {
        const card = document.createElement('div');
        card.className = 'weapon-card';
        
        const translatedClass = translations[wpn.class] || wpn.class;
        
        const attachmentsHtml = wpn.attachments.map(att => {
            let category = "";
            let name = "";

            // Вариант 1: Строка уже содержит двоеточие (Категория: Название)
            if (att.includes(':')) {
                let parts = att.split(':');
                category = parts[0].trim();
                name = parts.slice(1).join(':').trim();
            } 
            // Вариант 2: Двоеточия нет, пытаемся определить категорию "Muzzle" по ключевым словам в названии
            else {
                name = att.trim();
                const lowerName = name.toLowerCase();
                
                if (lowerName.includes('brake') || lowerName.includes('suppressor') || 
                    lowerName.includes('compensator') || lowerName.includes('silencer') || 
                    lowerName.includes('choke') || lowerName.includes('flash hider')) {
                    category = "Muzzle";
                } else if (lowerName.includes('barrel')) {
                    category = "Barrel";
                } else if (lowerName.includes('laser')) {
                    category = "Laser";
                } else if (lowerName.includes('optic') || lowerName.includes('sight') || lowerName.includes('scope')) {
                    category = "Optic";
                } else if (lowerName.includes('stock')) {
                    category = "Stock";
                } else if (lowerName.includes('grip')) {
                    category = "Rear Grip";
                } else if (lowerName.includes('mag') || lowerName.includes('drum') || lowerName.includes('round')) {
                    category = "Magazine";
                }
            }

            // Если категория определена (или была), переводим её и выводим красиво
            if (category) {
                let translatedCategory = translations[category] || category;
                return `<li><span>${translatedCategory}:</span> ${name}</li>`;
            }

            // Если определить категорию не удалось, оставляем просто иконку
            return `<li>🔧 ${name}</li>`;
        }).join('');

        card.innerHTML = `
            <div class="rank">#${wpn.rank}</div>
            <h2 class="weapon-name">${wpn.name}</h2>
            <div class="tags">
                <span class="tag game-tag">${wpn.game}</span>
                <span class="tag class-tag">${translatedClass}</span>
            </div>
            <ul class="attachments-list">
                ${attachmentsHtml}
            </ul>
        `;
        grid.appendChild(card);
    });
}


    // 4. Логіка швидкого пошуку по сайту
    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = allWeapons.filter(wpn => 
            wpn.name.toLowerCase().includes(query) || 
            wpn.class.toLowerCase().includes(query)
        );
        displayWeapons(filtered);
    });

    document.addEventListener('DOMContentLoaded', loadMeta);
</script>


</body>
</html>
