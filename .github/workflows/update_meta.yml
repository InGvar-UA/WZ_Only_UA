name: Auto Update Warzone Meta

on:
  schedule:
    # 🎯 Робот САМОСТІЙНО прокидатиметься щодня о 06:35 UTC, що дорівнює 09:35 ранку за Києвом!
    - cron: '35 6 * * *'
  workflow_dispatch: # Залишаємо кнопку ручного запуску на сайті


permissions:
  contents: write # Даємо роботу залізобетонне право на запис файлів у репозиторій

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей парсера
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil beautifulsoup4 playwright
          playwright install chromium

      - name: Запуск парсера мета-оружия
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python parser.py

      - name: Автоматический коммит и пуш обновлений на сайт
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add wz_meta_ua.json
          if git diff --cached --quiet; then
            echo "No changes in meta-data today."
          else
            git commit -m "Auto-update: Свіжі мета-збірки зброї від робота"
            git push origin main
          fi
